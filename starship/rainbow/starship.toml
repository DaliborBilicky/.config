format = """
[оӮ¶](color_orange)\
$username\
[оӮҙ](bg:color_yellow fg:color_orange)\
$directory\
[оӮҙ](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[оӮҙ](fg:color_aqua bg:color_blue)\
$c\
$nodejs\
$java\
$python\
$dotnet\
[оӮҙ](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
[оӮҙ](fg:color_bg3 bg:color_bg1)\
$cmd_duration\
[оӮҙ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
format = '[у°Јӣ $user](bg:color_orange fg:color_fg0)'

[directory]
read_only = 'у°Ңҫ '
format = "[ $read_only$path](fg:color_fg0 bg:color_yellow)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
truncation_length = 8
truncation_symbol = 'вҖҰ'
format = '[ пҗҳ $branch](fg:color_fg0 bg:color_aqua)'
only_attached = false
disabled = false

[git_commit]
commit_hash_length = 7
format = '[ пҗ— $hash](fg:color_fg0 bg:color_aqua)'
only_detached = true
tag_disabled = true
disabled = false

[git_state]
rebase = 'п“ӣ '
merge = 'о®«'
revert = 'о«’ '
cherry_pick = 'уұҒӮ '
bisect = 'оҡҸ '
am = 'пҗҜ '
am_or_rebase = 'пҗҜ /п“ӣ '
format = '[$state](fg:color_fg0 bg:color_aqua)'
disabled = false

[git_status]
conflicted = 'вҡ '
up_to_date = ''
untracked = 'п„Ә'
ahead = 'вҶ‘${count}'
diverged = 'вҶ‘${ahead_count}вҶ“${behind_count}'
behind = 'вҶ“${count}'
stashed = 'вҠһ'
modified = '*'
staged = '+$count'
renamed = '~'
deleted = 'оӘҒ'
format = '[$all_status$ahead_behind](fg:color_fg0 bg:color_aqua)'

[nodejs]
format = '[ оңҳ ($version)](fg:color_fg0 bg:color_blue)'

[c]
format = '[ оҳһ ($name $version)](fg:color_fg0 bg:color_blue)'

[java]
format = '[ оү– ($version)](fg:color_fg0 bg:color_blue)'

[python]
format = '[ оҳҶ (($virtualenv)$version)](fg:color_fg0 bg:color_blue)'

[dotnet]
format = '[ у°Ә® ($version)](fg:color_fg0 bg:color_blue)'

[docker_context]
format = '[ пҢҲ ($context)](fg:color_fg0 bg:color_bg3)'

[cmd_duration]
min_time = 1000
format = '[ пҮҡ $duration](fg:color_fg0 bg:color_bg1)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '\$'
error_symbol = '\$'
