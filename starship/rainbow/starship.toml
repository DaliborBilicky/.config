format = """
[оӮ¶](fg:orange)\
$username\
[оӮҙ](fg:orange bg:yellow)\
$directory\
[оӮҙ](fg:yellow bg:blue)\
$git_branch\
$git_commit\
$git_state\
$git_status\
[оӮҙ](fg:blue bg:bg2)\
$cmd_duration\
[оӮҙ ](fg:bg2)\
$c\
$nodejs\
$java\
$python\
$dotnet\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
fg1 = '#ebdbb2'
fg2 = '#d5c4a1'
bg1 = '#3c3836'
bg2 = '#504945'
blue = '#458588'
aqua = '#689d6a'
green = '#98971a'
orange = '#d65d0e'
purple = '#b16286'
red = '#cc241d'
yellow = '#d79921'

[username]
show_always = true
format = '[у°Јӣ $user](bg:orange fg:fg1)'

[directory]
read_only = 'у°Ңҫ '
format = "[ $read_only$path](fg:fg1 bg:yellow)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
truncation_length = 8
truncation_symbol = 'вҖҰ'
format = '[ пҗҳ $branch](fg:fg1 bg:blue)'
only_attached = false
disabled = false

[git_commit]
commit_hash_length = 7
format = '[ пҗ— $hash](fg:fg1 bg:blue)'
only_detached = true
tag_disabled = true
disabled = false

[git_state]
rebase = 'п“ӣ '
merge = 'о®«'
revert = 'о«’ '
cherry_pick = 'уұҒӮ '
bisect = 'оҡҸ '
am = 'пҗҜ '
am_or_rebase = 'пҗҜ /п“ӣ '
format = '[$state](fg:fg1 bg:blue)'
disabled = false

[git_status]
conflicted = 'вҡ '
up_to_date = ''
untracked = 'п„Ә'
ahead = 'вҶ‘${count}'
diverged = 'вҶ‘${ahead_count}вҶ“${behind_count}'
behind = 'вҶ“${count}'
stashed = 'вҠһ'
modified = '*'
staged = '+$count'
renamed = '~'
deleted = 'оӘҒ'
format = '[$all_status$ahead_behind](fg:fg1 bg:blue)'

[nodejs]
format = '[ оңҳ $version](fg:fg2)'

[c]
format = '[ оҳһ $name $version](fg:fg2)'

[java]
format = '[ оү– $version](fg:fg2)'

[python]
format = '[ оҳҶ $version(\($virtualenv\))](fg:fg2)'

[dotnet]
format = '[ у°Ә® $version](fg:fg2)'

# [docker_context]
# format = '[ пҢҲ ($context)](fg:fg1 bg:bg2)'

[cmd_duration]
min_time = 1000
format = '[ пҮҡ $duration](fg:fg1 bg:bg2)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '\$'
error_symbol = '\$'
