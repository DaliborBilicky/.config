format = """
[оӮ¶](fg:color_orange)\
$username\
[оӮҙ](fg:color_orange bg:color_yellow)\
$directory\
[оӮҙ](fg:color_yellow bg:color_blue)\
$git_branch\
$git_commit\
$git_state\
$git_status\
[оӮҙ](fg:color_blue bg:color_bg2)\
$cmd_duration\
[оӮҙ ](fg:color_bg2)\
$c\
$nodejs\
$java\
$python\
$dotnet\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg1 = '#ebdbb2'
color_fg2 = '#d5c4a1'
color_bg1 = '#3c3836'
color_bg2 = '#504945'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#d3869b'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
format = '[у°Јӣ $user](bg:color_orange fg:color_fg1)'

[directory]
read_only = 'у°Ңҫ '
format = "[ $read_only$path](fg:color_fg1 bg:color_yellow)"
truncation_length = 2
truncation_symbol = "вҖҰ/"

[git_branch]
truncation_length = 8
truncation_symbol = 'вҖҰ'
format = '[ пҗҳ $branch](fg:color_fg1 bg:color_blue)'
only_attached = false
disabled = false

[git_commit]
commit_hash_length = 7
format = '[ пҗ— $hash](fg:color_fg1 bg:color_blue)'
only_detached = true
tag_disabled = true
disabled = false

[git_state]
rebase = 'п“ӣ '
merge = 'о®«'
revert = 'о«’ '
cherry_pick = 'уұҒӮ '
bisect = 'оҡҸ '
am = 'пҗҜ '
am_or_rebase = 'пҗҜ /п“ӣ '
format = '[$state](fg:color_fg1 bg:color_blue)'
disabled = false

[git_status]
conflicted = 'вҡ '
up_to_date = ''
untracked = 'п„Ә'
ahead = 'вҶ‘${count}'
diverged = 'вҶ‘${ahead_count}вҶ“${behind_count}'
behind = 'вҶ“${count}'
stashed = 'вҠһ'
modified = '*'
staged = '+$count'
renamed = '~'
deleted = 'оӘҒ'
format = '[$all_status$ahead_behind](fg:color_fg1 bg:color_blue)'

[nodejs]
format = '[ оңҳ $version](fg:color_fg2)'

[c]
format = '[ оҳһ $name $version](fg:color_fg2)'

[java]
format = '[ оү– $version](fg:color_fg2)'

[python]
format = '[ оҳҶ $version(\($virtualenv\))](fg:color_fg2)'

[dotnet]
format = '[ у°Ә® $version](fg:color_fg2)'

# [docker_context]
# format = '[ пҢҲ ($context)](fg:color_fg1 bg:color_bg2)'

[cmd_duration]
min_time = 1000
format = '[ пҮҡ $duration](fg:color_fg1 bg:color_bg2)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '\$'
error_symbol = '\$'
