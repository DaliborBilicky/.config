add_newline = false

format = """
$python\
$c\
$character\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status """


[python]
# format = '\([у°Ң  ](#bdae93)[$version( $virtualenv)](#fabd2f)\)'
format = '(\([у°Ң  ](#bdae93)[$virtualenv](#fabd2f)\))'


[c]
detect_extensions = ['c', 'cpp', 'h', 'hpp']
# format = '\([оҳһ ](#bdae93)[$name $version](#83a598)\)'
format = '\([оҳһ ](#bdae93)[$name](#83a598)\)'


[java]
format = '\([оү– ](#bdae93)[$version](#fabd2f)\)'


[nodejs]
format = '\([оҙҚ ](#b8bb26)[$version](#a89984)\)'


[dotnet]
format = '\([у°Ә® ](#bdae93)[$version](#d3869b)\)'


[character]
success_symbol = '[ вһң](#bdae93)'
error_symbol = '[ вһң](#bdae93)'


[directory]
truncation_length = 1
read_only = 'уұҲё'
read_only_style = '#fe8019'
format = '[$path](fg:#8ec07c)[$read_only]($read_only_style)'
disabled = false
use_os_path_sep = false
truncate_to_repo = false


[git_branch]
truncation_length = 8
truncation_symbol = 'вҖҰ'
format = '\([пҗҳ ](#bdae93)[$branch](#83a598)'
only_attached = false
disabled = false


[git_commit]
commit_hash_length = 7
format = '\([пҗ— ](#bdae93)[$hash](#83a598)'
only_detached = true
tag_disabled = true
disabled = false


[git_state]
rebase = 'п“ӣ '
merge = 'о®«'
revert = 'о«’ '
cherry_pick = 'уұҒӮ '
bisect = 'оҡҸ '
am = 'пҗҜ '
am_or_rebase = 'пҗҜ /п“ӣ '
format = '[$state](#fe8019)'
disabled = false


[git_status]
conflicted = 'вҡ '
up_to_date = ''
untracked = 'п„Ә'
ahead = 'вҶ‘${count}'
diverged = 'вҶ‘${ahead_count}вҶ“${behind_count}'
behind = 'вҶ“${count}'
stashed = 'вҠһ'
modified = '*'
staged = '+$count'
renamed = '~'
deleted = 'оӘҒ'
format = '[$all_status$ahead_behind](#d3869b)\)'
