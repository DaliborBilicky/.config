add_newline = true

format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$c\
$java\
$python\
$nodejs\
$dotnet\
$fill\
$cmd_duration\
$line_break\
$character\
"""


[directory]
truncation_length = 1
read_only = 'уұҲё'
read_only_style = 'fg:#fe8019 bg:#32302f'
format = """
[оӮ¶](#b8bb26)\
[п„• ](fg:#282828 bg:#b8bb26)\
[ $path](fg:#b8bb26 bg:#32302f)\
[$read_only]($read_only_style)\
[оӮҙ](#32302f) \
"""
disabled = false
use_os_path_sep = false
truncate_to_repo = false


[git_branch]
truncation_length = 8
truncation_symbol = 'вҖҰ'
format = """
[оӮ¶](#83a598)\
[пҗҳ ](fg:#282828 bg:#83a598)\
[ $branch](fg:#83a598 bg:#32302f)\
"""
only_attached = false
disabled = false


[git_commit]
commit_hash_length = 7
format = """
[оӮ¶](#83a598)\
[пҗ— ](fg:#282828 bg:#83a598)\
[ $hash](fg:#83a598 bg:#32302f)\
"""
only_detached = true
tag_disabled = true
disabled = false


[git_state]
rebase = 'п“ӣ '
merge = 'о®«'
revert = 'о«’ '
cherry_pick = 'уұҒӮ '
bisect = 'оҡҸ '
am = 'пҗҜ '
am_or_rebase = 'пҗҜ /п“ӣ '
format = '[$state](fg:#fe8019 bg:#32302f)'
disabled = false


[git_status]
conflicted = 'вҡ '
up_to_date = ''
untracked = 'п„Ә'
ahead = 'вҶ‘${count}'
diverged = 'вҶ‘${ahead_count}вҶ“${behind_count}'
behind = 'вҶ“${count}'
stashed = 'вҠһ'
modified = '*'
staged = '+$count'
renamed = '~'
deleted = 'оӘҒ'
format = """
[$all_status$ahead_behind](fg:#d3869b bg:#32302f)\
[оӮҙ](#32302f) \
"""


[c]
detect_extensions = ['c', 'cpp', 'h', 'hpp']
format = '[оҳһ $name $version](#a89984) '


[java]
format = '[оү– $version](#a89984) '


[python]
format = '[у°Ң  $version $virtualenv](#a89984) '


[nodejs]
format = '[оҙҚ $version](#a89984) '


[dotnet]
format = '[у°Ә® $version](#a89984) '


[fill]
symbol = ' '


[cmd_duration]
min_time = 1000
format = """
[оӮ¶](#fabd2f)\
[пҮҡ ](fg:#282828 bg:#fabd2f)\
[ $duration](fg:#fabd2f bg:#32302f)\
[оӮҙ](#32302f) \
"""
 

[character]
success_symbol = '[п„…](#bdae93)'
error_symbol = '[п„…](#bdae93)'
